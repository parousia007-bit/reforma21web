<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analytics Dashboard | Reforma 2.1</title>
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,300;0,400;0,700;1,300;1,400&family=Source+Sans+3:wght@300;400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --bg-dark: #0a0e17;
      --text-gray: #8892a8;
      --text-light: #e8ebf4;
      --accent: #d4a843;
      --surface: rgba(30, 41, 59, 0.4);
      --glass-border: rgba(255, 255, 255, 0.05);
    }
    body {
      background-color: var(--bg-dark);
      color: var(--text-light);
      font-family: 'Source Sans 3', sans-serif;
      margin: 0;
      padding: 2rem;
      background-image: radial-gradient(circle at 15% 50%, rgba(212, 168, 67, 0.05), transparent 25%);
    }
    h1 {
      font-family: 'Merriweather', serif;
      color: var(--accent);
      text-align: center;
      margin-bottom: 2rem;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 1.5rem;
      margin-bottom: 2rem;
    }
    .glass-card {
      background: var(--surface);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 12px;
      padding: 1.5rem;
      text-align: center;
    }
    .glass-card h3 {
      font-size: 1rem;
      color: var(--text-gray);
      margin: 0 0 0.5rem 0;
    }
    .glass-card .value {
      font-size: 2.5rem;
      font-weight: 700;
      color: var(--text-light);
      margin: 0;
    }
    .charts-grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 1.5rem;
    }
    @media (max-width: 800px) {
      .charts-grid { grid-template-columns: 1fr; }
    }
    .chart-container {
      background: var(--surface);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(10px);
      border-radius: 12px;
      padding: 1.5rem;
    }
    .btn-back {
      display: inline-block;
      margin-bottom: 20px;
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div style="max-width: 1200px; margin: 0 auto;">
    <a href="../index.html" class="btn-back">← Volver al inicio</a>
    <h1>Dashboard de Analíticas</h1>
    
    <div class="grid">
      <div class="glass-card">
        <h3>Tiempo Promedio de Lectura</h3>
        <p class="value" id="avgTime">--</p>
      </div>
      <div class="glass-card">
        <h3>Retención Global (Scroll)</h3>
        <p class="value" id="avgScroll">--</p>
      </div>
      <div class="glass-card">
        <h3>Artículos Listados (Top)</h3>
        <p class="value" id="totalMonitored">--</p>
      </div>
    </div>

    <div class="charts-grid">
      <div class="chart-container">
        <h3 style="color: var(--text-gray); margin-top: 0; margin-bottom: 1rem;">Top 5 Artículos más Vistos</h3>
        <canvas id="viewsChart"></canvas>
      </div>
      <div class="chart-container">
        <h3 style="color: var(--text-gray); margin-top: 0; margin-bottom: 1rem;">Retención Promedio</h3>
        <div style="position: relative;">
            <canvas id="retentionChart"></canvas>
            <div id="retentionLabel" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 1.5rem; font-weight: 700; color: var(--text-light);">
                --
            </div>
        </div>
      </div>
    </div>

    <!-- Nuevos Gráficos de Audiencia -->
    <div class="charts-grid" style="margin-top: 1.5rem; grid-template-columns: 1fr 1fr;">
      <div class="chart-container">
        <h3 style="color: var(--text-gray); margin-top: 0; margin-bottom: 1rem;">Sistemas Operativos</h3>
        <canvas id="osChart"></canvas>
      </div>
      <div class="chart-container">
        <h3 style="color: var(--text-gray); margin-top: 0; margin-bottom: 1rem;">Proporción de Dispositivos</h3>
        <canvas id="deviceChart"></canvas>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      Chart.defaults.color = '#8892a8';
      Chart.defaults.font.family = "'Source Sans 3', sans-serif";

      try {
        const res = await fetch('/api/dashboard');
        
        if (res.status === 401 || res.status === 403) {
          window.location.href = 'login.html';
          return;
        }

        const data = await res.json();
        
        if (!data.success) throw new Error('Failed to load data');

        // Poblar Tarjetas
        const mins = Math.floor(data.globalStats.avgReadTimeSeconds / 60);
        const secs = data.globalStats.avgReadTimeSeconds % 60;
        document.getElementById('avgTime').innerText = `${mins}m ${secs}s`;
        document.getElementById('avgScroll').innerText = `${data.globalStats.avgScrollPercentage}%`;
        document.getElementById('totalMonitored').innerText = data.topArticles.length;
        document.getElementById('retentionLabel').innerText = `${data.globalStats.avgScrollPercentage}%`;

        // Preparar Datos Gráficas
        const labels = data.topArticles.map(a => a.title.length > 35 ? a.title.substring(0, 35) + '...' : a.title);
        const views = data.topArticles.map(a => a.views);

        // Renderizar Gráfica de Barras
        new Chart(document.getElementById('viewsChart'), {
          type: 'bar',
          data: {
            labels: labels,
            datasets: [{
              label: 'Vistas Totales',
              data: views,
              backgroundColor: 'rgba(212, 168, 67, 0.7)',
              borderColor: 'rgba(212, 168, 67, 1)',
              borderWidth: 1,
              borderRadius: 4
            }]
          },
          options: {
            responsive: true,
            scales: {
              y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.05)' } },
              x: { grid: { display: false } }
            }
          }
        });

        // Renderizar Gráfica de Dona (Retención)
        const scroll = data.globalStats.avgScrollPercentage;
        new Chart(document.getElementById('retentionChart'), {
          type: 'doughnut',
          data: {
            labels: ['Leído', 'Abandonado'],
            datasets: [{
              data: [scroll, 100 - scroll],
              backgroundColor: ['rgba(37, 99, 235, 0.8)', 'rgba(255, 255, 255, 0.05)'],
              borderColor: ['rgba(37, 99, 235, 1)', 'transparent'],
              borderWidth: 1
            }]
          },
          options: {
            responsive: true,
            cutout: '75%',
            plugins: {
              legend: { display: false }
            }
          }
        });

        // Gráfica: Sistemas Operativos
        const osLabels = data.osDistribution.map(d => d._id);
        const osCounts = data.osDistribution.map(d => d.count);
        new Chart(document.getElementById('osChart'), {
          type: 'pie',
          data: {
            labels: osLabels,
            datasets: [{
              data: osCounts,
              backgroundColor: ['#2563EB', '#D4AF37', '#10B981', '#F59E0B', '#8B5CF6'],
              borderColor: 'transparent',
              borderWidth: 1
            }]
          },
          options: {
            responsive: true,
            plugins: {
              legend: { position: 'right', labels: { color: '#8892a8' } }
            }
          }
        });

        // Gráfica: Dispositivos
        const devLabels = data.deviceDistribution.map(d => d._id);
        const devCounts = data.deviceDistribution.map(d => d.count);
        new Chart(document.getElementById('deviceChart'), {
          type: 'doughnut',
          data: {
            labels: devLabels,
            datasets: [{
              data: devCounts,
              backgroundColor: ['#10B981', '#3B82F6', '#8B5CF6'],
              borderColor: 'transparent',
              borderWidth: 1
            }]
          },
          options: {
            responsive: true,
            cutout: '60%',
            plugins: {
              legend: { position: 'right', labels: { color: '#8892a8' } }
            }
          }
        });

      } catch (err) {
        console.error('Dashboard Error:', err);
        alert('No se pudo cargar el dashboard. Verifique que la API está corriendo.');
      }
    });
  </script>
</body>
</html>
