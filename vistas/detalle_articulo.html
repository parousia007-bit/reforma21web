<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artículo | Reforma 2.1</title>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,300;0,400;0,700;1,300;1,400&family=Source+Sans+3:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0e17;
            --text-gray: #8892a8;
            --text-light: #e8ebf4;
            --accent: #d4a843;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            font-family: 'Source Sans 3', sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        .article-container {
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            box-sizing: border-box;
        }

        .header-image {
            width: 100%;
            height: 300px;
            object-fit: cover;
            border-radius: 12px;
            margin-bottom: 30px;
            display: none; /* Oculto hasta que cargue para evitar el cuadro roto */
        }

        h1 {
            font-family: 'Merriweather', serif;
            font-size: 2.5rem;
            line-height: 1.2;
            margin-bottom: 10px;
            color: var(--accent);
        }

        .meta-info {
            color: var(--text-gray);
            font-size: 0.9rem;
            margin-bottom: 30px;
            border-bottom: 1px solid #252d40;
            padding-bottom: 15px;
        }

        #article-content {
            font-size: 1.15rem;
            line-height: 1.8;
        }

        #article-content img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            margin: 20px 0;
        }

        @media (max-width: 600px) {
            h1 { font-size: 1.8rem; }
            .header-image { height: 200px; }
            #article-content { font-size: 1.1rem; }
            .article-container { padding: 15px; }
        }

        .btn-back {
            display: inline-block;
            margin-bottom: 20px;
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="article-container">
        <a href="../index.html" class="btn-back">← Volver al inicio</a>
        <img id="header-img" class="header-image" src="" alt="Cabecera del artículo">
        <h1 id="article-title">Cargando...</h1>
        <div class="meta-info">
            <span id="article-author"></span> | <span id="article-date"></span>
        </div>
        <div id="article-content">
            </div>
    </div>

    <script src="../js/db/db_articulos.js"></script>
    <script src="../js/db/articulos.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            const contentEl = document.getElementById('article-content');
            
            if (!id) {
                contentEl.innerHTML = `<h2 style="color: #ff6b6b;">Error</h2><p>ID de artículo no proporcionado.</p>`;
                return;
            }

            let article = null;
            let usedFallback = false;

            try {
                // 1. Fetch from the new API
                const response = await fetch('/api/articles/' + encodeURIComponent(id));
                if (!response.ok) throw new Error('Network response was not ok');
                article = await response.json();
            } catch (error) {
                console.warn('Fallo al obtener artículo de la API. Intentando fallback estático...', error);
                
                // 2. Fallback to old JS variable if API fails
                if (typeof articulosDB !== 'undefined' && articulosDB[id]) {
                    article = articulosDB[id];
                } else if (typeof contenidosDB !== 'undefined' && contenidosDB[id]) {
                    article = contenidosDB[id];
                }
                usedFallback = true;
            }

            if (article) {
                // Update DOM with sanitized data
                document.title = (DOMPurify.sanitize(article.titulo) || "Artículo") + " | Reforma 2.1";
                
                let imgSrc = article.imagen_cabecera;
                if (imgSrc && !imgSrc.startsWith('http') && !imgSrc.startsWith('../')) {
                    imgSrc = '../' + imgSrc;
                }
                
                const imgEl = document.getElementById('header-img');
                if (imgSrc) {
                    imgEl.src = DOMPurify.sanitize(imgSrc);
                    imgEl.style.display = 'block';
                    // Pequeña animación de entrada suave para la cabecera
                    imgEl.style.opacity = '0';
                    imgEl.style.transition = 'opacity 0.8s ease-in-out';
                    setTimeout(() => imgEl.style.opacity = '1', 50);
                }
                
                const titleEl = document.getElementById('article-title');
                titleEl.innerHTML = DOMPurify.sanitize(article.titulo || '');
                titleEl.style.color = DOMPurify.sanitize(article.color_tema || 'var(--accent)');
                
                document.getElementById('article-author').innerText = "Por: " + DOMPurify.sanitize(article.autor || "Equipo Reforma 2.1");
                document.getElementById('article-date').innerText = DOMPurify.sanitize(article.fecha || "");
                
                // Animación suave de carga del contenido
                contentEl.style.opacity = '0';
                contentEl.style.transition = 'opacity 0.5s ease';
                setTimeout(() => {
                    contentEl.innerHTML = DOMPurify.sanitize(article.htmlContent || article.contenido || '');
                    contentEl.style.opacity = '1';
                }, 100);

            } else {
                contentEl.style.opacity = '0';
                setTimeout(() => {
                    contentEl.innerHTML = `
                        <h2 style="color: #ff6b6b;">Error Crítico</h2>
                        <p>No se pudo cargar la información del ID: <b>${DOMPurify.sanitize(id)}</b>.</p>
                        <p style="font-size: 0.9rem; color: #8892a8;">(La API está inactiva y no se encontró en la base de datos estática de respaldo)</p>
                    `;
                    contentEl.style.opacity = '1';
                }, 100);
            }
        });
    </script>
</body>
</html>
