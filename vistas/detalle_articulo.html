<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artículo | Reforma 2.1</title>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,300;0,400;0,700;1,300;1,400&family=Source+Sans+3:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0e17;
            --text-gray: #8892a8;
            --text-light: #e8ebf4;
            --accent: #d4a843;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            font-family: 'Source Sans 3', sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        /* Contenedor Responsivo */
        .article-container {
            width: 100%;
            max-width: 800px; /* Ancho máximo para lectura cómoda en PC */
            margin: 0 auto;
            padding: 20px;
            box-sizing: border-box;
        }

        .header-image {
            width: 100%;
            height: 300px;
            object-fit: cover;
            border-radius: 12px;
            margin-bottom: 30px;
        }

        h1 {
            font-family: 'Merriweather', serif;
            font-size: 2.5rem; /* Se ajusta solo */
            line-height: 1.2;
            margin-bottom: 10px;
            color: var(--accent);
        }

        .meta-info {
            color: var(--text-gray);
            font-size: 0.9rem;
            margin-bottom: 30px;
            border-bottom: 1px solid #252d40;
            padding-bottom: 15px;
        }

        #article-content {
            font-size: 1.15rem; /* Tamaño de lectura ideal */
            line-height: 1.8;
        }

        /* --- MEDIA QUERIES (MAGIA PARA CELULAR) --- */
        @media (max-width: 600px) {
            h1 {
                font-size: 1.8rem; /* Letra más pequeña para títulos en celular */
            }
            .header-image {
                height: 200px; /* Imagen más baja para no robar espacio */
            }
            #article-content {
                font-size: 1.1rem; /* Mantenemos la letra grande para que sea legible */
            }
            .article-container {
                padding: 15px; /* Menos margen lateral en móvil */
            }
        }

        .btn-back {
            display: inline-block;
            margin-bottom: 20px;
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="article-container">
        <a href="../index.html" class="btn-back">← Volver al inicio</a>
        <img id="header-img" class="header-image" src="" alt="">
        <h1 id="article-title">Cargando...</h1>
        <div class="meta-info">
            <span id="article-author"></span> | <span id="article-date"></span>
        </div>
        <div id="article-content">
            </div>
    </div>

    <script src="../js/db/articulos.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            const article = articulos[id];

            if (article) {
                document.title = article.titulo + " | Reforma 2.1";
                document.getElementById('header-img').src = article.imagen_cabecera;
                document.getElementById('article-title').innerText = article.titulo;
                document.getElementById('article-title').style.color = article.color_tema || 'var(--accent)';
                document.getElementById('article-author').innerText = "Por: " + article.autor;
                document.getElementById('article-date').innerText = article.fecha;
                document.getElementById('article-content').innerHTML = article.contenido;
            } else {
                document.getElementById('article-content').innerHTML = "<h2>Artículo no encontrado</h2>";
            }
        });
    </script>
</body>
</html>
