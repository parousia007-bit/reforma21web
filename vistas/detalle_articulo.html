<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artículo | Reforma 2.1</title>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,300;0,400;0,700;1,300;1,400&family=Source+Sans+3:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0e17;
            --text-gray: #8892a8;
            --text-light: #e8ebf4;
            --accent: #d4a843;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            font-family: 'Source Sans 3', sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        .article-container {
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            box-sizing: border-box;
        }

        .header-image {
            width: 100%;
            height: 300px;
            object-fit: cover;
            border-radius: 12px;
            margin-bottom: 30px;
            display: none; /* Oculto hasta que cargue para evitar el cuadro roto */
        }

        h1 {
            font-family: 'Merriweather', serif;
            font-size: 2.5rem;
            line-height: 1.2;
            margin-bottom: 10px;
            color: var(--accent);
        }

        .meta-info {
            color: var(--text-gray);
            font-size: 0.9rem;
            margin-bottom: 30px;
            border-bottom: 1px solid #252d40;
            padding-bottom: 15px;
        }

        #article-content {
            font-size: 1.15rem;
            line-height: 1.8;
        }

        #article-content img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            margin: 20px 0;
        }

        @media (max-width: 600px) {
            h1 { font-size: 1.8rem; }
            .header-image { height: 200px; }
            #article-content { font-size: 1.1rem; }
            .article-container { padding: 15px; }
        }

        .btn-back {
            display: inline-block;
            margin-bottom: 20px;
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="article-container">
        <a href="../index.html" class="btn-back">← Volver al inicio</a>
        <img id="header-img" class="header-image" src="" alt="Cabecera del artículo">
        <h1 id="article-title">Cargando...</h1>
        <div class="meta-info">
            <span id="article-author"></span> | <span id="article-date"></span>
        </div>
        <div id="article-content">
            </div>
    </div>

    <script src="../js/db/db_articulos.js"></script>
    <script src="../js/db/articulos.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            
            let article = null;
            
            // Búsqueda EXACTA con los nombres reales de la base de datos
            if (typeof articulosDB !== 'undefined' && articulosDB[id]) {
                article = articulosDB[id];
            } else if (typeof contenidosDB !== 'undefined' && contenidosDB[id]) {
                article = contenidosDB[id];
            }

            if (article) {
                document.title = article.titulo + " | Reforma 2.1";
                
                let imgSrc = article.imagen_cabecera;
                if (imgSrc && !imgSrc.startsWith('http') && !imgSrc.startsWith('../')) {
                    imgSrc = '../' + imgSrc;
                }
                
                const imgEl = document.getElementById('header-img');
                if(imgSrc) {
                    imgEl.src = imgSrc;
                    imgEl.style.display = 'block';
                }
                
                document.getElementById('article-title').innerText = article.titulo;
                document.getElementById('article-title').style.color = article.color_tema || 'var(--accent)';
                document.getElementById('article-author').innerText = "Por: " + (article.autor || "Equipo Reforma 2.1");
                document.getElementById('article-date').innerText = article.fecha || "";
                document.getElementById('article-content').innerHTML = article.contenido;
            } else {
                document.getElementById('article-content').innerHTML = `
                    <h2 style="color: #ff6b6b;">Error Crítico</h2>
                    <p>No se pudo cargar la información del ID: <b>${id}</b>.</p>
                `;
            }
        });
    </script>
</body>
</html>
