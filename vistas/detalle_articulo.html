<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artículo | Reforma 2.1</title>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,300;0,400;0,700;1,300;1,400&family=Source+Sans+3:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0e17;
            --text-gray: #8892a8;
            --text-light: #e8ebf4;
            --accent: #d4a843;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            font-family: 'Source Sans 3', sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        .article-container {
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            box-sizing: border-box;
        }

        .header-image {
            width: 100%;
            height: 300px;
            min-height: 200px;
            object-fit: cover;
            border-radius: 12px;
            margin-bottom: 30px;
            display: none; /* Oculto hasta que cargue para evitar el cuadro roto */
            background: rgba(30, 41, 59, 0.4); /* placeholder mientras carga */
        }

        h1 {
            font-family: 'Merriweather', serif;
            font-size: 2.5rem;
            line-height: 1.2;
            margin-bottom: 10px;
            color: var(--accent);
        }

        .meta-info {
            color: var(--text-gray);
            font-size: 0.9rem;
            margin-bottom: 30px;
            border-bottom: 1px solid #252d40;
            padding-bottom: 15px;
        }

        #article-content {
            font-size: 1.15rem;
            line-height: 1.8;
            text-align: justify;
        }
        #article-content p {
            text-align: justify !important;
            line-height: 1.8 !important;
            margin-bottom: 1.2em;
        }
        #article-content h1, #article-content h2, #article-content h3,
        #article-content h4, #article-content h5, #article-content h6 {
            text-align: left;
            line-height: 1.3;
        }

        #article-content img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            margin: 20px 0;
        }

        @media (max-width: 600px) {
            h1 { font-size: 1.8rem; }
            .header-image { height: 200px; }
            #article-content { font-size: 1.1rem; }
            .article-container { padding: 15px; }
        }

        .btn-back {
            display: inline-block;
            margin-bottom: 20px;
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>
<div id="maintenance-notice" style="position: sticky; top: 0; z-index: 9999; background: rgba(212, 168, 67, 0.15); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(212, 168, 67, 0.4); color: #D4A843; text-align: center; padding: 12px 20px; font-family: 'Georgia', serif; font-style: italic; font-size: 0.95rem; box-shadow: 0 4px 15px rgba(0,0,0,0.3);">✨ Estamos perfeccionando la arquitectura visual para mejorar la experiencia de lectura. Este fin de semana realizaremos ajustes en vivo; si encuentra algún error de visualización, lo resolveremos a la brevedad. Gracias por su paciencia.</div>
    <div class="article-container">
        <a href="../index.html" class="btn-back">← Volver al inicio</a>
        <img id="header-img" class="header-image" src="" alt="Cabecera del artículo">
        <h1 id="article-title">Cargando...</h1>
        <div class="meta-info">
            <span id="article-author"></span> | <span id="article-date"></span>
        </div>
        <div id="article-content">
            </div>
    </div>

    <script src="../js/db/db_articulos.js?v=1.2"></script>
    <script src="../js/db/articulos.js?v=1.2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    <script>
        // Decodifica entidades HTML escapadas (ej: &lt;p&gt; → <p>)
        function decodeHTMLEntities(text) {
            var textArea = document.createElement('textarea');
            textArea.innerHTML = text;
            return textArea.value;
        }

        document.addEventListener('DOMContentLoaded', async () => {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            const contentEl = document.getElementById('article-content');
            
            if (!id) {
                contentEl.innerHTML = `<h2 style="color: #ff6b6b;">Error</h2><p>ID de artículo no proporcionado.</p>`;
                return;
            }

            let article = null;
            let usedFallback = false;

            try {
                // 1. Fetch from the new API
                const response = await fetch('/api/articles/' + encodeURIComponent(id));
                if (!response.ok) throw new Error('Network response was not ok');
                article = await response.json();
            } catch (error) {
                console.warn('Fallo al obtener artículo de la API. Intentando fallback estático...', error);
                
                // 2. Fallback to old JS variable if API fails
                if (typeof articulosDB !== 'undefined' && articulosDB[id]) {
                    article = articulosDB[id];
                } else if (typeof contenidosDB !== 'undefined' && contenidosDB[id]) {
                    article = contenidosDB[id];
                }
                usedFallback = true;
            }

            if (article) {
                // Update DOM with sanitized data
                document.title = (DOMPurify.sanitize(article.titulo) || "Artículo") + " | Reforma 2.1";
                
                let imgSrc = article.imagen_cabecera;
                if (imgSrc && !imgSrc.startsWith('http') && !imgSrc.startsWith('../')) {
                    imgSrc = '../' + imgSrc;
                }
                
                const imgEl = document.getElementById('header-img');
                if (imgSrc) {
                    imgEl.src = DOMPurify.sanitize(imgSrc);
                    imgEl.style.display = 'block';
                    // Pequeña animación de entrada suave para la cabecera
                    imgEl.style.opacity = '0';
                    imgEl.style.transition = 'opacity 0.8s ease-in-out';
                    setTimeout(() => imgEl.style.opacity = '1', 50);
                }
                
                const titleEl = document.getElementById('article-title');
                titleEl.innerHTML = DOMPurify.sanitize(article.titulo || '');
                titleEl.style.color = DOMPurify.sanitize(article.color_tema || 'var(--accent)');
                
                document.getElementById('article-author').innerText = "Por: " + DOMPurify.sanitize(article.autor || "Equipo Reforma 2.1");
                document.getElementById('article-date').innerText = DOMPurify.sanitize(article.fecha || "");
                
                // Animación suave de carga del contenido
                contentEl.style.opacity = '0';
                contentEl.style.transition = 'opacity 0.5s ease';
                setTimeout(() => {
                    const purifyConfig = {
                        ALLOWED_TAGS: ['b', 'i', 'em', 'strong', 'a', 'p', 'h1', 'h2', 'h3', 'h4', 'h5', 'h6', 'ul', 'ol', 'li', 'blockquote', 'span', 'div', 'table', 'thead', 'tbody', 'tr', 'th', 'td', 'img', 'figure', 'figcaption'],
                        ALLOWED_ATTR: ['class', 'style', 'href', 'src', 'alt', 'target']
                    };
                    // Pipeline: Decodificar Entidades → Sanitizar → Inyectar
                    let rawContent = article.htmlContent || article.contenido || '';

                    // ── DIAGNÓSTICO (F12 → Consola) ──────────────────────────────
                    console.group('[Reforma 2.1] Renderizado del Artículo');
                    console.log('📄 ID:', id);
                    console.log('🔗 pdf_url:', article.pdf_url || '(vacío)');
                    console.log('🎥 video_url:', article.video_url || '(vacío)');
                    console.log('📝 Primeros 200 chars del contenido recibido:', rawContent.substring(0, 200));
                    console.groupEnd();

                    // ── STRIP DEFENSIVO DE FRONTMATTER ───────────────────────────
                    // Si el backend envía el frontmatter pegado al HTML (error de config),
                    // lo eliminamos aquí para que no aparezcan los -- y campos YAML en pantalla.
                    if (rawContent.trimStart().startsWith('---')) {
                        const fmEnd = rawContent.indexOf('\n---', 3);
                        if (fmEnd !== -1) rawContent = rawContent.substring(fmEnd + 4).trimStart();
                    }

                    const decodedHTML = decodeHTMLEntities(rawContent);
                    contentEl.innerHTML = DOMPurify.sanitize(decodedHTML, purifyConfig);
                    
                    // Autocorrección de Tablas (Estándar Editorial)
                    const tables = contentEl.querySelectorAll('table');
                    tables.forEach(table => {
                        table.classList.add('pro-table');
                        const wrapper = document.createElement('div');
                        wrapper.className = 'pro-table-wrapper';
                        table.parentNode.insertBefore(wrapper, table);
                        wrapper.appendChild(table);
                    });

                    // ── VIDEO INCRUSTADO ─────────────────────────────────────────
                    // videoWrapper declarado aquí (scope externo) para evitar ReferenceError
                    let videoWrapper = null;
                    const rawVideoUrl = (article.video_url || '').trim().replace(/^['"]|['"]$/g, '');

                    if (rawVideoUrl) {
                        try {
                            let embedUrl = rawVideoUrl;
                            // YouTube: watch?v= o youtu.be/
                            const ytMatch = rawVideoUrl.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
                            if (ytMatch) embedUrl = `https://www.youtube.com/embed/${ytMatch[1]}`;
                            // Facebook video
                            const fbMatch = rawVideoUrl.match(/facebook\.com\/.*\/videos\/(\d+)/);
                            if (fbMatch) embedUrl = `https://www.facebook.com/plugins/video.php?href=${encodeURIComponent(rawVideoUrl)}&width=640`;

                            videoWrapper = document.createElement('div');
                            videoWrapper.style.cssText = 'position:relative;padding-bottom:56.25%;height:0;overflow:hidden;border-radius:12px;margin:2.5rem 0;background:rgba(10,14,23,0.6);border:1px solid rgba(255,255,255,0.08);';
                            videoWrapper.innerHTML = `<iframe src="${embedUrl}" style="position:absolute;top:0;left:0;width:100%;height:100%;border:0;border-radius:12px;" allowfullscreen allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" loading="lazy"></iframe>`;
                            contentEl.parentNode.insertBefore(videoWrapper, contentEl.nextSibling);
                        } catch (videoErr) {
                            console.warn('[Video] Error al incrustar video:', videoErr.message);
                            videoWrapper = null; // reset para que el PDF no dependa de él
                        }
                    }

                    // ── BOTÓN DE DESCARGA ─────────────────────────────────────────
                    // Bloque completamente independiente: funciona aunque no haya video.
                    const pdfUrl  = (article.pdf_url  || '').trim().replace(/^['"]|['"]$/g, '');
                    const pdfText = (article.pdf_text || 'Descargar PDF').trim().replace(/^['"]|['"]$/g, '');

                    if (pdfUrl) {
                        try {
                            const dlBlock = document.createElement('div');
                            dlBlock.style.cssText = 'margin:2.5rem 0;padding:1.5rem 2rem;background:rgba(212,168,67,0.07);border:1px solid rgba(212,168,67,0.25);border-radius:12px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem;';
                            dlBlock.innerHTML = `
                              <div>
                                <p style="margin:0 0 .25rem 0;font-size:.8rem;font-weight:700;color:rgba(212,168,67,.7);text-transform:uppercase;letter-spacing:.1em;">Recurso Descargable</p>
                                <p style="margin:0;color:#e8ebf4;font-weight:600;">${DOMPurify.sanitize(pdfText)}</p>
                              </div>
                              <a href="${DOMPurify.sanitize(pdfUrl)}" target="_blank" rel="noopener noreferrer"
                                 style="display:inline-flex;align-items:center;gap:.5rem;background:#D4A843;color:#0a0e17;font-weight:700;padding:.7rem 1.5rem;border-radius:8px;text-decoration:none;transition:opacity .2s;"
                                 onmouseover="this.style.opacity='.8'" onmouseout="this.style.opacity='1'">
                                📥 ${DOMPurify.sanitize(pdfText)}
                              </a>`;
                            // Insertar después del video si existe, si no, después del contenido
                            const anchorEl = videoWrapper || contentEl;
                            anchorEl.parentNode.insertBefore(dlBlock, anchorEl.nextSibling);
                        } catch (pdfErr) {
                            console.warn('[PDF] Error al renderizar botón de descarga:', pdfErr.message);
                        }
                    }

                    contentEl.style.opacity = '1';

                    // --- INICIO DE TELEMETRÍA FRONTEND ---
                    // 1. Centinela para detectar el final real del artículo
                    const sentinel = document.createElement('div');
                    sentinel.style.height = '1px';
                    sentinel.style.marginTop = '20px';
                    contentEl.appendChild(sentinel);

                    let timeSpent = 0;
                    let lastTime = Date.now();
                    let maxScrollDepth = 0;

                    // 2. Tracker de Scroll (Porcentaje + Observer)
                    const updateScroll = () => {
                        const h = document.documentElement.scrollHeight - window.innerHeight;
                        if (h > 0) {
                            const pct = Math.round((window.scrollY / h) * 100);
                            if (pct > maxScrollDepth) maxScrollDepth = Math.min(pct, 100);
                        }
                    };
                    window.addEventListener('scroll', updateScroll, { passive: true });

                    if ('IntersectionObserver' in window) {
                        const io = new IntersectionObserver(entries => {
                            if (entries[0].isIntersecting) {
                                maxScrollDepth = 100;
                                io.disconnect(); // No necesitamos observarlo más si ya llegó a 100
                            }
                        });
                        io.observe(sentinel);
                    }

                    // 3. Tracker de Tiempo y Transmisión de Datos (Visibility API)
                    document.addEventListener('visibilitychange', () => {
                        if (document.visibilityState === 'hidden') {
                            // Sumar los segundos reales en foco
                            timeSpent += Math.round((Date.now() - lastTime) / 1000);
                            
                            // Actualizar scroll por si la ventana se cerró de golpe sin disparar evento scroll final
                            updateScroll();

                            // Enviar payload de forma asíncrona sin bloquear la navegación
                            const payload = {
                                articleId: id,
                                timeSpent: timeSpent,
                                scrollDepth: maxScrollDepth
                            };

                            fetch('/api/metrics', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify(payload),
                                keepalive: true
                            }).catch(err => console.warn('Telemetry transmit error:', err));
                            
                            // Resetear timeSpent a 0 para que si el usuario regresa a la pestaña y la vuelve a cerrar, 
                            // solo se envíe el tiempo incremental nuevo (MongoDB usa $inc)
                            timeSpent = 0; 
                        } else if (document.visibilityState === 'visible') {
                            // Reiniciar el reloj cuando recobra el foco
                            lastTime = Date.now();
                        }
                    });
                    // --- FIN DE TELEMETRÍA ---
                }, 100);

            } else {
                contentEl.style.opacity = '0';
                setTimeout(() => {
                    contentEl.innerHTML = `
                        <h2 style="color: #ff6b6b;">Error Crítico</h2>
                        <p>No se pudo cargar la información del ID: <b>${DOMPurify.sanitize(id)}</b>.</p>
                        <p style="font-size: 0.9rem; color: #8892a8;">(La API está inactiva y no se encontró en la base de datos estática de respaldo)</p>
                    `;
                    contentEl.style.opacity = '1';
                }, 100);
            }
        });
    </script>

    <!-- ── VISIT TRACKING + GEOLOCALIZACIÓN ─────────────────────────────── -->
    <script>
      (async function trackVisit() {
        try {
          // Obtener article_id de la URL
          const articleId = new URLSearchParams(window.location.search).get('id') || null;

          // Detectar tipo de dispositivo del lado cliente
          const ua = navigator.userAgent;
          let deviceType = 'desktop';
          if (/Android|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(ua)) {
            deviceType = /iPad/i.test(ua) ? 'tablet' : 'mobile';
          }

          // Obtener ubicación vía ipapi.co (petición ligera, ~200ms)
          let location = null;
          try {
            const geoRes = await fetch('https://ipapi.co/json/', { cache: 'no-store' });
            if (geoRes.ok) {
              const geo = await geoRes.json();
              location = {
                country:      geo.country_name || null,
                country_code: geo.country_code  || null,
                city:         geo.city          || null,
                region:       geo.region        || null,
                latitude:     geo.latitude       || null,
                longitude:    geo.longitude      || null,
              };
            }
          } catch (geoErr) {
            console.warn('[Visit] ipapi.co no disponible:', geoErr.message);
          }

          // Enviar al backend — fire-and-forget (no bloqueamos la UI)
          await fetch('/api/metrics/visit', {
            method:  'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              article_id:  articleId,
              location,
              device_type: deviceType,
              referrer:    document.referrer || null,
            }),
            keepalive: true,  // permite que la petición continúe aunque el usuario navegue
          });

        } catch (err) {
          // Nunca interrumpimos la experiencia del lector por un error de analytics
          console.warn('[Visit] Error en visit tracking:', err.message);
        }
      })();
    </script>
</body>
</html>
